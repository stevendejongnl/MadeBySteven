name: Build and Deploy
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  determine-color:
    runs-on: ubuntu-latest
    outputs:
      NEW_COLOR: ${{ steps.color.outputs.NEW_COLOR }}
      OLD_COLOR: ${{ steps.color.outputs.OLD_COLOR }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine next deployment color
        id: color
        shell: bash
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          echo "Checking for existing blue image..."
          if docker manifest inspect ghcr.io/stevendejongnl/madebysteven:blue >/dev/null 2>&1; then
            echo "Blue image found, setting new color to green"
            NEW_COLOR="green"
            OLD_COLOR="blue"
          else
            echo "Blue image not found, setting new color to blue"
            NEW_COLOR="blue"
            OLD_COLOR="green"
          fi
          echo "NEW_COLOR=${NEW_COLOR}" >> "$GITHUB_OUTPUT"
          echo "OLD_COLOR=${OLD_COLOR}" >> "$GITHUB_OUTPUT"
          echo "Color values being set:"
          cat $GITHUB_OUTPUT

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.12.0
      - run: npm ci
      - name: TypeScript type checking
        run: npm run typecheck

  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Lint with ruff
        run: cd backend && uv sync --frozen && uv run ruff check src
      - name: Type check with mypy
        run: cd backend && uv run mypy src

  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Run backend tests
        run: cd backend && uv sync --frozen && uv run pytest --tb=short

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.12.0

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run compile

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npm run test:fast

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  build:
    needs: [determine-color, typecheck, backend-lint, backend-tests, frontend-tests]
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.12.0

      - name: Install dependencies
        run: npm ci

      - name: Build (compile) public directory
        run: npm run compile

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Debug color value
        run: |
          echo "Determined color value: ${{ needs.determine-color.outputs.NEW_COLOR }}"

      - name: Build and push image
        uses: docker/build-push-action@v5
        env:
          COLOR: ${{ needs.determine-color.outputs.NEW_COLOR }}
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ghcr.io/stevendejongnl/madebysteven:${{ env.COLOR }}

  deploy:
    needs: [determine-color, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Bypass Cloudflare for Kubernetes deployment
        uses: xiaotianxt/bypass-cloudflare-for-github-action@v2.1.0
        with:
          cf_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          cf_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          cf_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          disable_bot_fight_mode: 'true'
          bfm_propagation_delay: 45

      - name: Remove existing deployment for new color
        run: |
          curl -X DELETE \
            -H "Authorization: Bearer ${{ secrets.KUBERNETES_TOKEN }}" \
            -H "Content-Type: application/json" \
            -k \
            "${{ secrets.KUBERNETES_API_URL }}/k8s/clusters/local/apis/apps/v1/namespaces/madebysteven/deployments/madebysteven-${{ needs.determine-color.outputs.NEW_COLOR }}" \
            2>/dev/null || true

      - name: Ensure Service and Ingress exist
        run: |
          # Create or update Service
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.KUBERNETES_TOKEN }}" \
            -H "Content-Type: application/json" \
            -k \
            -d @- \
            "${{ secrets.KUBERNETES_API_URL }}/k8s/clusters/local/api/v1/namespaces/madebysteven/services" << 'EOF' 2>/dev/null || \
          curl -X PATCH \
            -H "Authorization: Bearer ${{ secrets.KUBERNETES_TOKEN }}" \
            -H "Content-Type: application/merge-patch+json" \
            -k \
            -d @- \
            "${{ secrets.KUBERNETES_API_URL }}/k8s/clusters/local/api/v1/namespaces/madebysteven/services/madebysteven" << 'EOF'
          {
            "apiVersion": "v1",
            "kind": "Service",
            "metadata": {
              "name": "madebysteven",
              "namespace": "madebysteven",
              "labels": {"app": "madebysteven"}
            },
            "spec": {
              "type": "ClusterIP",
              "selector": {"app": "madebysteven", "color": "blue"},
              "ports": [{"protocol": "TCP", "port": 8000, "targetPort": 8000}]
            }
          }
          EOF

          # Create or update Ingress
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.KUBERNETES_TOKEN }}" \
            -H "Content-Type: application/json" \
            -k \
            -d @- \
            "${{ secrets.KUBERNETES_API_URL }}/k8s/clusters/local/apis/networking.k8s.io/v1/namespaces/madebysteven/ingresses" << 'EOF' 2>/dev/null || \
          curl -X PATCH \
            -H "Authorization: Bearer ${{ secrets.KUBERNETES_TOKEN }}" \
            -H "Content-Type: application/merge-patch+json" \
            -k \
            -d @- \
            "${{ secrets.KUBERNETES_API_URL }}/k8s/clusters/local/apis/networking.k8s.io/v1/namespaces/madebysteven/ingresses/madebysteven" << 'EOF'
          {
            "apiVersion": "networking.k8s.io/v1",
            "kind": "Ingress",
            "metadata": {
              "name": "madebysteven",
              "namespace": "madebysteven",
              "annotations": {"nginx.ingress.kubernetes.io/backend-protocol": "HTTP"}
            },
            "spec": {
              "ingressClassName": "nginx",
              "rules": [
                {
                  "host": "www.madebysteven.nl",
                  "http": {
                    "paths": [{
                      "path": "/",
                      "pathType": "Prefix",
                      "backend": {"service": {"name": "madebysteven", "port": {"number": 8000}}}
                    }]
                  }
                },
                {
                  "host": "madebysteven.nl",
                  "http": {
                    "paths": [{
                      "path": "/",
                      "pathType": "Prefix",
                      "backend": {"service": {"name": "madebysteven", "port": {"number": 8000}}}
                    }]
                  }
                }
              ]
            }
          }
          EOF

      - name: Deploy new version
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.KUBERNETES_TOKEN }}" \
            -H "Content-Type: application/json" \
            -k \
            -d @- \
            "${{ secrets.KUBERNETES_API_URL }}/k8s/clusters/local/apis/apps/v1/namespaces/madebysteven/deployments" << 'EOF'
          {
            "apiVersion": "apps/v1",
            "kind": "Deployment",
            "metadata": {
              "name": "madebysteven-${{ needs.determine-color.outputs.NEW_COLOR }}",
              "namespace": "madebysteven",
              "labels": {
                "app": "madebysteven",
                "color": "${{ needs.determine-color.outputs.NEW_COLOR }}"
              }
            },
            "spec": {
              "replicas": 1,
              "selector": {
                "matchLabels": {
                  "app": "madebysteven",
                  "color": "${{ needs.determine-color.outputs.NEW_COLOR }}"
                }
              },
              "template": {
                "metadata": {
                  "labels": {
                    "app": "madebysteven",
                    "color": "${{ needs.determine-color.outputs.NEW_COLOR }}"
                  },
                  "annotations": {
                    "redeploy-hash": "${{ github.sha }}"
                  }
                },
                "spec": {
                  "containers": [
                    {
                      "name": "app",
                      "image": "ghcr.io/stevendejongnl/madebysteven:${{ needs.determine-color.outputs.NEW_COLOR }}",
                      "imagePullPolicy": "Always",
                      "ports": [
                        {
                          "containerPort": 8000
                        }
                      ],
                      "env": [
                        {
                          "name": "GITHUB_USERNAME",
                          "value": "stevendejongnl"
                        },
                        {
                          "name": "GITHUB_TOKEN",
                          "valueFrom": {
                            "secretKeyRef": {
                              "name": "github-token",
                              "key": "token",
                              "optional": true
                            }
                          }
                        }
                      ],
                      "livenessProbe": {
                        "httpGet": {
                          "path": "/api/health",
                          "port": 8000
                        },
                        "initialDelaySeconds": 10,
                        "periodSeconds": 30,
                        "timeoutSeconds": 5
                      },
                      "readinessProbe": {
                        "httpGet": {
                          "path": "/api/health",
                          "port": 8000
                        },
                        "initialDelaySeconds": 5,
                        "periodSeconds": 10,
                        "timeoutSeconds": 5
                      }
                    }
                  ]
                }
              }
            }
          }
          EOF

      - name: Switch traffic to new version
        run: |
          curl -X PATCH \
            -H "Authorization: Bearer ${{ secrets.KUBERNETES_TOKEN }}" \
            -H "Content-Type: application/merge-patch+json" \
            -k \
            -d '{"spec":{"selector":{"color":"${{ needs.determine-color.outputs.NEW_COLOR }}"}}}' \
            "${{ secrets.KUBERNETES_API_URL }}/k8s/clusters/local/api/v1/namespaces/madebysteven/services/madebysteven"

      - name: Verify deployment
        run: |
          echo "Active color: ${{ needs.determine-color.outputs.NEW_COLOR }}"
          echo "Deployment name: madebysteven-${{ needs.determine-color.outputs.NEW_COLOR }}"
          curl -H "Authorization: Bearer ${{ secrets.KUBERNETES_TOKEN }}" -k \
            "${{ secrets.KUBERNETES_API_URL }}/k8s/clusters/local/api/v1/namespaces/madebysteven/pods?labelSelector=app=madebysteven,color=${{ needs.determine-color.outputs.NEW_COLOR }}"

      - name: Wait for deployment to be ready
        run: |
          max_attempts=30
          attempt=0
          while [ $attempt -lt $max_attempts ]; do
            ready=$(curl -s -H "Authorization: Bearer ${{ secrets.KUBERNETES_TOKEN }}" -k \
              "${{ secrets.KUBERNETES_API_URL }}/k8s/clusters/local/apis/apps/v1/namespaces/madebysteven/deployments/madebysteven-${{ needs.determine-color.outputs.NEW_COLOR }}" | \
              jq '.status.conditions[] | select(.type=="Available") | .status' -r)
            if [ "$ready" = "True" ]; then
              echo "✓ Deployment is ready"
              exit 0
            fi
            attempt=$((attempt + 1))
            echo "Waiting for deployment... (attempt $attempt/$max_attempts)"
            sleep 2
          done
          echo "✗ Deployment failed to become ready"
          exit 1

      - name: Health check
        run: |
          echo "Waiting for ingress routing to propagate (10s)..."
          sleep 10

          echo "Checking health endpoint with retries..."
          max_attempts=10
          attempt=0
          while [ $attempt -lt $max_attempts ]; do
            attempt=$((attempt + 1))
            echo "Attempt $attempt/$max_attempts..."

            # Use HTTPS (Cloudflare enforces HTTPS redirect)
            # Use -f to fail on HTTP errors
            # Use -L to follow redirects
            # Use --max-time 10 to timeout
            if health=$(curl -fsSL --max-time 10 https://www.madebysteven.nl/api/health 2>&1); then
              status=$(echo "$health" | jq -r '.status' 2>/dev/null)
              if [ "$status" = "ok" ]; then
                echo "✓ Health check passed"
                exit 0
              fi
              echo "Health check returned unexpected status: $status"
            else
              echo "Health check failed with curl error"
            fi

            if [ $attempt -lt $max_attempts ]; then
              echo "Retrying in 5 seconds..."
              sleep 5
            fi
          done

          echo "✗ Health check failed after $max_attempts attempts"
          exit 1

      - name: Cleanup old deployments
        run: |
          curl -X GET \
            -H "Authorization: Bearer ${{ secrets.KUBERNETES_TOKEN }}" \
            -H "Content-Type: application/json" \
            -k \
            "${{ secrets.KUBERNETES_API_URL }}/k8s/clusters/local/apis/apps/v1/namespaces/madebysteven/deployments?labelSelector=app=madebysteven,color=${{ needs.determine-color.outputs.OLD_COLOR }}" | \
            jq -r '.items[:-1] | .[].metadata.name' | \
            while read deployment; do
              curl -X DELETE \
                -H "Authorization: Bearer ${{ secrets.KUBERNETES_TOKEN }}" \
                -k \
                "${{ secrets.KUBERNETES_API_URL }}/k8s/clusters/local/apis/apps/v1/namespaces/madebysteven/deployments/$deployment"
            done
