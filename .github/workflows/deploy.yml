name: Build and Deploy
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  determine-color:
    runs-on: ubuntu-latest
    outputs:
      NEW_COLOR: ${{ steps.color.outputs.NEW_COLOR }}
      OLD_COLOR: ${{ steps.color.outputs.OLD_COLOR }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine next deployment color
        id: color
        shell: bash
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          echo "Checking for existing blue image..."
          if docker manifest inspect ghcr.io/stevendejongnl/madebysteven:blue >/dev/null 2>&1; then
            echo "Blue image found, setting new color to green"
            NEW_COLOR="green"
            OLD_COLOR="blue"
          else
            echo "Blue image not found, setting new color to blue"
            NEW_COLOR="blue"
            OLD_COLOR="green"
          fi
          echo "NEW_COLOR=${NEW_COLOR}" >> "$GITHUB_OUTPUT"
          echo "OLD_COLOR=${OLD_COLOR}" >> "$GITHUB_OUTPUT"
          echo "Color values being set:"
          cat $GITHUB_OUTPUT

  build:
    needs: determine-color
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.13.0

      - name: Install dependencies
        run: npm ci

      - name: Build (compile) public directory
        run: npm run compile

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Debug color value
        run: |
          echo "Determined color value: ${{ needs.determine-color.outputs.NEW_COLOR }}"

      - name: Build and push image
        uses: docker/build-push-action@v5
        env:
          COLOR: ${{ needs.determine-color.outputs.NEW_COLOR }}
        with:
          context: .
          push: true
          tags: ghcr.io/stevendejongnl/madebysteven:${{ env.COLOR }}

  deploy:
    needs: [determine-color, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Bypass Cloudflare for Kubernetes deployment
        uses: xiaotianxt/bypass-cloudflare-for-github-action@v2.1.0
        with:
          cf_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          cf_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          cf_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          disable_bot_fight_mode: 'true'
          bfm_propagation_delay: 45

      - name: Remove existing deployment for new color
        run: |
          curl -X DELETE \
            -H "Authorization: Bearer ${{ secrets.KUBERNETES_TOKEN }}" \
            -H "Content-Type: application/json" \
            -k \
            "${{ secrets.KUBERNETES_API_URL }}/k8s/clusters/local/apis/apps/v1/namespaces/madebysteven/deployments/madebysteven-${{ needs.determine-color.outputs.NEW_COLOR }}" \
            2>/dev/null || true

      - name: Deploy new version
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.KUBERNETES_TOKEN }}" \
            -H "Content-Type: application/json" \
            -k \
            -d @- \
            "${{ secrets.KUBERNETES_API_URL }}/k8s/clusters/local/apis/apps/v1/namespaces/madebysteven/deployments" << 'EOF'
          {
            "apiVersion": "apps/v1",
            "kind": "Deployment",
            "metadata": {
              "name": "madebysteven-${{ needs.determine-color.outputs.NEW_COLOR }}",
              "namespace": "madebysteven",
              "labels": {
                "app": "madebysteven",
                "color": "${{ needs.determine-color.outputs.NEW_COLOR }}"
              }
            },
            "spec": {
              "replicas": 1,
              "selector": {
                "matchLabels": {
                  "app": "madebysteven",
                  "color": "${{ needs.determine-color.outputs.NEW_COLOR }}"
                }
              },
              "template": {
                "metadata": {
                  "labels": {
                    "app": "madebysteven",
                    "color": "${{ needs.determine-color.outputs.NEW_COLOR }}"
                  },
                  "annotations": {
                    "redeploy-hash": "${{ github.sha }}"
                  }
                },
                "spec": {
                  "containers": [
                    {
                      "name": "madebysteven",
                      "image": "ghcr.io/stevendejongnl/madebysteven:${{ needs.determine-color.outputs.NEW_COLOR }}",
                      "imagePullPolicy": "Always"
                    }
                  ]
                }
              }
            }
          }
          EOF

      - name: Switch traffic to new version
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.KUBERNETES_TOKEN }}" \
            -H "Content-Type: application/json" \
            -k \
            -d @- \
            "${{ secrets.KUBERNETES_API_URL }}/k8s/clusters/local/api/v1/namespaces/madebysteven/services" << 'EOF'
          {
            "apiVersion": "v1",
            "kind": "Service",
            "metadata": {
              "name": "madebysteven-app",
              "namespace": "madebysteven"
            },
            "spec": {
              "ports": [
                {
                  "port": 80,
                  "targetPort": 80
                }
              ],
              "selector": {
                "app": "madebysteven",
                "color": "${{ needs.determine-color.outputs.NEW_COLOR }}"
              }
            }
          }
          EOF

      - name: Verify deployment
        run: |
          echo "Active color: ${{ needs.determine-color.outputs.NEW_COLOR }}"
          echo "Deployment name: madebysteven-${{ needs.determine-color.outputs.NEW_COLOR }}"
          curl -H "Authorization: Bearer ${{ secrets.KUBERNETES_TOKEN }}" -k \
            "${{ secrets.KUBERNETES_API_URL }}/k8s/clusters/local/api/v1/namespaces/madebysteven/pods?labelSelector=app=madebysteven,color=${{ needs.determine-color.outputs.NEW_COLOR }}"

      - name: Cleanup old deployments
        run: |
          curl -X GET \
            -H "Authorization: Bearer ${{ secrets.KUBERNETES_TOKEN }}" \
            -H "Content-Type: application/json" \
            -k \
            "${{ secrets.KUBERNETES_API_URL }}/k8s/clusters/local/apis/apps/v1/namespaces/madebysteven/deployments?labelSelector=app=madebysteven,color=${{ needs.determine-color.outputs.OLD_COLOR }}" | \
            jq -r '.items[:-1] | .[].metadata.name' | \
            while read deployment; do
              curl -X DELETE \
                -H "Authorization: Bearer ${{ secrets.KUBERNETES_TOKEN }}" \
                -k \
                "${{ secrets.KUBERNETES_API_URL }}/k8s/clusters/local/apis/apps/v1/namespaces/madebysteven/deployments/$deployment"
            done
